<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#12304a"><title>My Football Strength</title><link rel="manifest" href="manifest.webmanifest"><style>
:root{--navy:#12304a;--blue:#1769e0;--lime:#b9f24a;--green:#147a52;--paper:#f7fafc;--muted:#607184}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--navy);font-family:ui-rounded,"SF Pro Rounded",system-ui,sans-serif}.app{min-height:100vh}.brand{height:70px;display:flex;align-items:center;gap:12px;max-width:980px;margin:auto;padding:0 20px}.logo{width:44px;height:44px;border-radius:15px;background:var(--lime);display:grid;place-items:center;font-size:24px}.brand div:last-child{display:flex;flex-direction:column}.brand b{font-size:14px;letter-spacing:.06em}.brand span{font-size:12px;color:var(--muted)}.hero{background:linear-gradient(135deg,#12304a,#174c75);color:#fff;max-width:980px;margin:auto;border-radius:30px;padding:36px 42px}.hero small{font-weight:900;letter-spacing:.14em;color:var(--lime)}.hero h1{font-size:clamp(36px,7vw,58px);line-height:1;margin:12px 0}.hero p{font-size:18px;line-height:1.5;color:#d8e9f5;max-width:620px}.chooser{max-width:880px;margin:30px auto;padding:0 20px 60px}label{font-weight:900;font-size:13px;display:grid;gap:7px;max-width:360px}select{background:#fff;border:2px solid #cbd8e3;border-radius:14px;padding:14px 16px;font:700 16px inherit;color:var(--navy)}h2{font-size:24px;margin:30px 0 14px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.card{position:relative;text-align:left;background:#fff;border:2px solid #dce6ed;border-radius:20px;padding:18px;cursor:pointer;color:var(--navy);box-shadow:0 3px 0 #dce6ed}.card.selected{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 0 #b8d0f1}.card b{display:flex;align-items:center;gap:10px;font-size:17px;padding-right:64px}.card i{font-style:normal;background:var(--navy);color:#fff;width:30px;height:30px;border-radius:10px;display:grid;place-items:center}.card small,.card em{display:block;margin-top:8px;color:var(--muted);font-style:normal;font-size:13px;line-height:1.4}.tag{position:absolute;right:12px;top:12px;padding:5px 8px;border-radius:99px;background:#dcfce7;color:#166534;font-size:10px;font-weight:900;text-transform:uppercase}.tag.strength{background:#fff0d8;color:#9a4d00}.safety{background:#fff8d9;border:1px solid #f2db7b;border-radius:15px;padding:15px;margin:20px 0;font-size:14px}.primary,.next{border:0;background:var(--blue);color:#fff;border-radius:17px;padding:17px 22px;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 6px 0 #0d48a0;width:100%}.rule{text-align:center;font-size:12px;color:var(--muted);line-height:1.5}.player{background:#fff;max-width:760px;min-height:100vh;margin:auto}.top{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 17px;font-size:13px}.top button{border:0;background:transparent;color:var(--blue);font-weight:900}.progress{height:6px;background:#e5edf3}.progress span{display:block;height:100%;background:var(--lime)}.exercise{padding:22px 24px 44px}.title{display:flex;align-items:center;gap:13px}.title>span{font-size:40px}.title small{font-weight:900;color:var(--blue);text-transform:uppercase}.title h1{font-size:clamp(31px,7vw,46px);line-height:1;margin:4px 0}.demo{height:250px;background:linear-gradient(#eaf6ff,#fff);border:2px solid #d7e7f0;border-radius:24px;margin:20px 0 12px;position:relative;overflow:hidden}.floor{position:absolute;height:5px;background:#b9d5a8;bottom:34px;left:8%;right:8%}.person{position:absolute;left:42%;top:48px;width:80px;height:160px;transform-origin:50% 80%}.head{position:absolute;width:36px;height:36px;border-radius:50%;background:#ffd1a3;border:4px solid var(--navy);left:22px}.body{position:absolute;width:12px;height:70px;background:var(--blue);left:34px;top:36px;border-radius:9px}.arm,.leg{position:absolute;height:10px;background:var(--navy);border-radius:9px;transform-origin:6px 5px}.arm{width:58px;top:54px;left:35px}.a1{transform:rotate(28deg)}.a2{transform:rotate(152deg)}.leg{width:70px;top:101px;left:38px}.l1{transform:rotate(58deg)}.l2{transform:rotate(122deg)}.motion{position:absolute;right:18%;top:42%;font-size:45px;color:var(--green);font-weight:900}.playing .person{animation:bob 1.5s ease-in-out infinite}.squat.playing .person{animation:squat 2s ease-in-out infinite}.lunge.playing .person,.slider.playing .person,.kick.playing .person{animation:lunge 2s ease-in-out infinite}.plank .person,.bridge .person,.deadbug .person,.bird .person,.clam .person{transform:rotate(70deg);top:80px}.side.playing .person,.march.playing .person,.balance.playing .person{animation:side 1.7s ease-in-out infinite}.skip.playing .person,.calf.playing .person{animation:skip .7s ease-in-out infinite}@keyframes bob{50%{transform:translateY(-10px)}}@keyframes squat{50%{transform:translateY(38px) rotate(-5deg)}}@keyframes lunge{50%{transform:translateX(38px) translateY(18px)}}@keyframes side{50%{transform:translateX(45px)}}@keyframes skip{50%{transform:translateY(-18px)}}.dose{background:var(--navy);color:#fff;border-radius:13px;padding:12px 15px}.dose span{color:var(--lime);font-weight:900;font-size:11px;letter-spacing:.1em;margin-right:10px}.steps{list-style:none;padding:0;display:grid;gap:11px}.steps li{display:flex;gap:11px;font-size:17px;line-height:1.4}.steps i{font-style:normal;flex:0 0 29px;height:29px;border-radius:10px;background:#eaf4ff;color:var(--blue);font-size:14px;font-weight:900;display:grid;place-items:center}.cues{display:flex;gap:7px;flex-wrap:wrap}.cues span{background:#e7f7ea;color:#166534;padding:8px 11px;border-radius:99px;font-size:12px;font-weight:900}.timer{margin:21px 0;background:#eef5fa;border-radius:22px;padding:15px;display:flex;align-items:center;justify-content:space-between}.timer>div{text-align:center}.timer small{display:block;font-size:10px;font-weight:900;letter-spacing:.1em;color:var(--muted)}.timer b{font-size:38px;font-variant-numeric:tabular-nums}.timer button{border:0;border-radius:14px;padding:13px 16px;font-weight:900;cursor:pointer}.reset{background:#fff}.play{background:var(--lime);color:#173200}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.actions button,.actions a{border:1px solid #d6e0e8;background:#fff;color:var(--navy);border-radius:13px;padding:11px 8px;font:800 12px inherit;text-align:center;text-decoration:none}.help{background:#fff8d9;border-radius:16px;padding:14px 17px;margin-top:12px}.help b{font-size:12px;color:#8a5900;text-transform:uppercase}.help p{margin:3px 0 11px;line-height:1.45}.next{margin-top:20px}.finish{min-height:100vh;display:grid;place-content:center;text-align:center;padding:30px;background:linear-gradient(#e9f8ff,#f7ffe8)}.finish h1{font-size:clamp(42px,9vw,76px);margin:12px 0}.finish p{font-size:19px;color:var(--muted)}.stars{font-size:55px}@media(max-width:650px){.hero{border-radius:0;padding:28px 20px}.brand{height:62px}.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr}.exercise{padding:20px 15px 40px}.demo{height:225px}.timer{position:sticky;bottom:8px;z-index:5;box-shadow:0 8px 30px #12304a30}}
</style></head><body><div id="app"></div><script>
const E=(name,emoji,focus,kind,seconds,how,cues,easier,watch)=>({name,emoji,focus,kind,seconds,how,cues,easier,watch,video:'https://www.youtube.com/results?search_query='+encodeURIComponent(name+' proper form exercise')});
const ex={mobility:E('Easy mobility flow','🌿','Loosen up and breathe','mobility',150,['Move slowly through ankle rocks, a gentle hip stretch and open-book turns.','Nothing should hurt or feel forced.','Breathe out slowly as you move.'],['Easy range','Slow breaths','No pain'],'Do only ankle rocks and relaxed breathing.','Her face and shoulders should stay relaxed.'),march:E('Balance march','🚶‍♀️','Balance and strong posture','march',90,['Stand tall and lift one knee.','Pause for one second without wobbling.','Lower quietly and change legs.'],['Stand tall','Pause','Quiet feet'],'Touch a wall with one finger.','Her hips stay level and she does not rush.'),rope:E('Easy rope skipping','➰','Ankles and rhythm','skip',180,['Make tiny jumps, just high enough for the rope.','Turn the rope from the wrists.','Stop if landings become loud.'],['Tiny jumps','Quiet feet','Relax shoulders'],'Use an invisible rope or march in place.','She lands softly and can still talk.'),squat:E('Chair target squat','🪑','Glutes and strong legs','squat',120,['Stand just in front of a chair.','Push hips back and lightly touch the chair.','Push the whole foot into the floor and stand tall.'],['Hips back','Knees over toes','Stand tall'],'Use a higher chair or hold a bench.','Both knees point the same way as her toes.'),bridge:E('Glute bridge','🌉','Build strong glutes','bridge',120,['Lie on your back with knees bent.','Squeeze your bottom and lift your hips.','Pause, then lower slowly.'],['Ribs down','Squeeze glutes','Slow lower'],'Lift only halfway.','She feels her glutes, not pressure in her lower back.'),bandwalk:E('Mini-band side walk','↔️','Side glutes and knee control','side',120,['Put a light band above the knees.','Bend the knees a little and step sideways.','Keep space between the feet as you return.'],['Toes forward','Hips level','Small steps'],'Do it without a band.','Her body does not rock from side to side.'),plank:E('Front plank','📏','Core strength','plank',90,['Place forearms on the floor or hands on a couch.','Make one long line from shoulders to feet.','Breathe normally and stop before hips drop.'],['Ribs down','Squeeze glutes','Keep breathing'],'Put hands on a couch or table.','Stop the hold as soon as her back changes shape.'),lunge:E('Supported reverse lunge','🦵','Single-leg strength','lunge',150,['Hold a wall lightly.','Step one foot backwards and lower a little.','Push through the front foot to come back.'],['Step back','Front heel heavy','Tall chest'],'Stay in split stance and make a small dip.','The front knee stays lined up with the second toe.'),slider:E('Towel slider kick-out','🧦','Standing-leg and kicking control','slider',150,['Stand on one leg and hold a chair.','Put the other foot on a towel and slide it forward like a gentle pass.','Pull it back slowly, then slide diagonally.'],['Soft standing knee','Hips level','Slow return'],'Make the slide very short.','The standing knee stays steady and the hips do not twist.'),kick:E('Controlled band kick','⚽','Strengthen the kicking action','kick',150,['Use a very light band anchored safely behind the ankle.','Lift the knee, then gently straighten the lower leg.','Return slowly. Never snap or lock the knee.'],['Lift then extend','Soft knee','Slow return'],'Remove the band and practise a shadow pass.','The band is secure and she stays tall without swinging.'),sideplank:E('Knee side plank','🌙','Side core and hip strength','plank',90,['Lie on your side with knees bent.','Put the elbow under the shoulder.','Lift the hips and breathe, then change sides.'],['Push the floor','Hips forward','Breathe'],'Hold for only eight seconds at a time.','The shoulder stays away from the ear.'),calf:E('Slow calf raise','🦶','Calves and ankles','calf',120,['Touch a wall for balance.','Rise up through the big toes.','Pause, then lower for two slow counts.'],['Tall heels','Big toes down','Slow lower'],'Use both legs and more hand support.','The ankles do not roll outwards.'),tib:E('Wall toe raise','⬆️','Front shins and ankle control','calf',90,['Lean your back against a wall.','Keep heels down and lift the toes.','Lower slowly without rocking.'],['Heels heavy','Lift toes','Slow down'],'Bring feet closer to the wall.','Only the feet move; the body stays still.'),balance:E('Single-leg reach','⭐','Foot, ankle and hip balance','balance',120,['Stand on one leg with a soft knee.','Reach the free foot forward, sideways and backwards.','Come back to the middle after every reach.'],['Soft knee','Hips level','Tripod foot'],'Hold the wall and make tiny reaches.','The standing knee does not fall inward.'),deadbug:E('Dead bug heel tap','🐞','Core control','deadbug',120,['Lie on your back with knees up.','Keep your lower back gently heavy.','Tap one heel down, return and change sides.'],['Breathe out','Back stays still','Move slowly'],'Slide the heel along the floor.','Make the reach shorter if her back lifts.'),bird:E('Bird dog','🐕','Core and hip stability','bird',120,['Start on hands and knees.','Reach the opposite arm and leg long.','Pause without twisting, then change sides.'],['Hips square','Reach long','Pause'],'Move only one leg.','Imagine a cup of water staying level on her back.'),lateral:E('Side lunge','↙️','Side-to-side leg strength','lunge',150,['Step wide to one side.','Sit the stepping hip backwards while the other leg stays long.','Push the whole foot into the floor and return.'],['Step wide','Hip back','Foot flat'],'Make the step and bend smaller.','The knee and foot both face forwards.'),ham:E('Bridge walk-out','👣','Hamstrings and glutes','bridge',120,['Lift into a glute bridge.','Take two tiny heel steps away.','Walk back slowly while keeping hips level.'],['Tiny steps','Hips up','Go slowly'],'Hold a normal bridge instead.','Stop if the hamstrings cramp or hips drop.'),clam:E('Side-lying clam','🐚','Hip stability','clam',120,['Lie on your side with knees bent and feet together.','Open the top knee a small amount.','Close slowly without rolling backwards.'],['Hips stacked','Small range','Slow return'],'Use no band.','The pelvis stays still; only the knee moves.')};
const sessions=[['A','Recovery + activation','Easy','Best for the day after a match.',['mobility','march','bridge','deadbug','calf']],['B','Glutes + squat strength','Strength','Main home strength session.',['march','rope','squat','bridge','bandwalk','plank']],['C','Club-day primer','Easy','Wake the muscles up without making the legs tired.',['march','bandwalk','balance','slider','mobility']],['D','Single-leg + kick strength','Strength','Choose this OR Session F in a normal match week.',['march','rope','lunge','slider','kick','sideplank']],['E','Ankles + core','Easy','Good on a club-training day.',['march','calf','tib','balance','bird','mobility']],['F','Whole lower-body strength','Strength','Choose this OR Session D in a normal match week.',['march','squat','lateral','ham','clam','plank']],['G','Rest-day reset','Recovery','On match day, the match replaces this session.',['mobility','march','deadbug','calf']]];
let state={mode:'home',week:1,code:'B',idx:0,left:0,running:false,help:false,timer:null};const app=document.getElementById('app');const S=()=>sessions.find(x=>x[0]===state.code);const X=()=>ex[S()[4][state.idx]];function dose(x){let d=[4,8,12].includes(state.week),b=state.week>=5&&!d;if(x===ex.mobility)return'Move gently for 2½ minutes';if(x===ex.rope)return d?'4 × 20 sec, 30 sec rest':b?'6 × 30 sec, 30 sec rest':'5 × 20 sec, 30 sec rest';if([ex.plank,ex.sideplank,ex.balance].includes(x))return d?'2 × 12 sec each side':b?'3 × 20 sec each side':'2 × 15 sec each side';return d?'2 × 6 slow reps':b?'3 × 8–10 slow reps':'2 × 8 slow reps'}function format(t){return Math.floor(t/60)+':'+String(t%60).padStart(2,'0')}function home(){clearInterval(state.timer);state.mode='home';app.innerHTML=`<main class="app"><header class="brand"><div class="logo">⚽</div><div><b>MY FOOTBALL STRENGTH</b><span>Strong, steady, confident</span></div></header><section class="hero"><small>12-WEEK HOME PROGRAMME</small><h1>Ready to get stronger?</h1><p>Pick your week and today’s session. We’ll guide you one exercise at a time.</p></section><section class="chooser"><label>Which week?<select id="week">${Array.from({length:12},(_,i)=>`<option value="${i+1}" ${state.week===i+1?'selected':''}>Week ${i+1}${[4,8,12].includes(i+1)?' • Easy progress week':''}</option>`).join('')}</select></label><h2>Choose today’s session</h2><div class="grid">${sessions.map(s=>`<button class="card ${state.code===s[0]?'selected':''}" data-code="${s[0]}"><span class="tag ${s[2].toLowerCase()}">${s[2]}</span><b><i>${s[0]}</i>${s[1]}</b><small>${s[3]}</small><em>${s[4].length} exercises • about 30 min</em></button>`).join('')}</div><div class="safety"><b>Today’s check:</b> Any pain, limping or very tired legs? Choose A, E or G—or rest.</div><button class="primary" id="start">Start Session ${state.code} →</button><p class="rule">Normal football week: complete Session B plus either D or F. The other sessions are easy activation or recovery.</p></section></main>`;document.querySelector('#week').onchange=e=>{state.week=+e.target.value;home()};document.querySelectorAll('.card').forEach(b=>b.onclick=()=>{state.code=b.dataset.code;home()});document.querySelector('#start').onclick=start}function start(){state.idx=0;state.left=ex[S()[4][0]].seconds;state.running=false;state.help=false;player()}function demo(x){return`<div class="demo ${x.kind} ${state.running?'playing':''}"><div class="floor"></div><div class="person"><span class="head"></span><span class="body"></span><span class="arm a1"></span><span class="arm a2"></span><span class="leg l1"></span><span class="leg l2"></span></div><div class="motion">→</div></div>`}function player(){clearInterval(state.timer);let s=S(),x=X();app.innerHTML=`<main class="player"><header class="top"><button id="back">← Back</button><span>Week ${state.week} • Session ${state.code}</span><b>${state.idx+1}/${s[4].length}</b></header><div class="progress"><span style="width:${state.idx/s[4].length*100}%"></span></div><section class="exercise"><div class="title"><span>${x.emoji}</span><div><small>${x.focus}</small><h1>${x.name}</h1></div></div>${demo(x)}<div class="dose"><span>TODAY</span><b>${dose(x)}</b></div><ol class="steps">${x.how.map((t,i)=>`<li><i>${i+1}</i>${t}</li>`).join('')}</ol><div class="cues">${x.cues.map(t=>`<span>✓ ${t}</span>`).join('')}</div><div class="timer"><button class="reset" id="reset">↻</button><div><small>${state.running?'KEEP GOING':'READY?'}</small><b>${format(state.left)}</b></div><button class="play" id="play">${state.running?'Pause':'Start timer'}</button></div><div class="actions"><button id="speak">🔊 Read it to me</button><button id="easy">✨ Make it easier</button><a href="${x.video}" target="_blank">▶ Real video demo</a></div>${state.help?`<div class="help"><b>Easy version</b><p>${x.easier}</p><b>Parent check</b><p>${x.watch}</p></div>`:''}<button class="next" id="next">${state.idx===s[4].length-1?'Finish session':'Next exercise'} →</button></section></main>`;document.querySelector('#back').onclick=()=>state.idx?go(-1):home();document.querySelector('#reset').onclick=()=>{state.left=x.seconds;state.running=false;player()};document.querySelector('#play').onclick=()=>{state.running=!state.running;player();if(state.running){state.timer=setInterval(()=>{state.left--;let b=document.querySelector('.timer b');if(b)b.textContent=format(state.left);if(state.left<=0){clearInterval(state.timer);state.running=false;player();try{speechSynthesis.speak(new SpeechSynthesisUtterance('Great work. Rest, then press next.'))}catch(e){}}},1000)}};document.querySelector('#easy').onclick=()=>{state.help=!state.help;player()};document.querySelector('#speak').onclick=()=>{try{speechSynthesis.cancel();speechSynthesis.speak(new SpeechSynthesisUtterance(x.name+'. '+x.how.join(' ')+'. Remember: '+x.cues.join(', ')))}catch(e){}};document.querySelector('#next').onclick=()=>state.idx===s[4].length-1?finish():go(1)}function go(n){state.idx+=n;state.left=X().seconds;state.running=false;state.help=false;player();scrollTo(0,0)}function finish(){clearInterval(state.timer);localStorage.setItem('w'+state.week+'-'+state.code,'done');app.innerHTML=`<main class="finish"><div class="stars">⭐ ⚽ ⭐</div><h1>Session complete!</h1><p>You moved with control and built your football strength.</p><button class="primary" id="again">Back to sessions</button></main>`;document.querySelector('#again').onclick=home}home();if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
</script></body></html>
